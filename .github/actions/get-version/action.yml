name: Read service version
description: Read version for a service

inputs:
  service_name:
    required: true
    description: "Service name (psn-fetcher | image-uploader | igdb-enricher | backend | frontend)"

outputs:
  version:
    description: "Resolved version for the service"
    value: ${{ steps.read.outputs.version }}

runs:
  using: "composite"
  steps:
    - id: read
      shell: bash
      run: |
        set -euo pipefail

        SERVICE_NAME="${{ inputs.service_name }}"
        VERSION=""

        case "$SERVICE_NAME" in
          frontend)
            VERSION=$(node -p "require('./frontend/package.json').version")
            ;;
          psn-fetcher)
            VERSION=$(node -p "require('./psn_fetcher/package.json').version")
            ;;
          igdb-enricher)
            VERSION=$(tr -d '\r' < "igdb_enricher/VERSION")
            ;;
          image-uploader)
            VERSION=$(tr -d '\r' < "image_uploader/VERSION")
            ;;
          backend)
            VERSION=$(grep '^version=' ./backend/gradle.properties | cut -d'=' -f2)
            ;;
          *)
            echo "❌ Unknown service_name: $SERVICE_NAME"
            echo "Expected: psn-fetcher | image-uploader | igdb-enricher | backend | frontend"
            exit 1
            ;;
        esac
        
        echo "Resolved version for service_name=$SERVICE_NAME: $VERSION"

        if [ -z "$VERSION" ]; then
          echo "❌ Version is empty for service_name=$SERVICE_NAME"
          exit 1
        fi

        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
