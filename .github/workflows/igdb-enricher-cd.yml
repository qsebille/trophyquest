name: IGDB Enricher - CD
on:
  push:
    branches:
      - main
    paths:
      - "igdb_enricher/**"
      - ".github/workflows/igdb-enricher-cd.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get version
        id: get-version
        uses: ./.github/actions/get-version
        with:
          service_name: igdb-enricher

      - name: Package Lambda
        id: package
        shell: bash
        run: |
          cd igdb_enricher
          rm -rf packaged-lambda lambda.zip
          mkdir -p packaged-lambda
          
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -t packaged-lambda/
          
          cp -r src/* packaged-lambda/
          
          cd packaged-lambda
          zip -r "../lambda.zip" .
          echo "zip_path=igdb_enricher/lambda.zip" >> $GITHUB_OUTPUT

      - name: Deploy to AWS
        uses: ./.github/actions/deploy-lambda
        with:
          function_name: trophyquest-igdb-enricher
          semantic_version: ${{ steps.get-version.outputs.version }}
          zip_path: ${{ steps.package.outputs.zip_path }}
          aws_region: ${{ secrets.AWS_REGION }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}

      - name: Create and push tag
        run: |
          VERSION=${{ steps.get-version.outputs.version }}
          TAG="igdb-enricher-v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi
