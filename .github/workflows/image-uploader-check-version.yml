name: Check version bumped for Python Lambdas
on:
  pull_request:
    branches:
      - main
    paths:
      - "image_uploader/**"
      - ".github/workflows/image-uploader-*.yml"

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: image_uploader

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get-version
        uses: ./.github/actions/get-version
        with:
          service_name: image-uploader

      - name: Compare versions
        run: |
          git fetch origin main
          OLD_VERSION=$(git show origin/main:image_uploader/VERSION)
          NEW_VERSION=${{ steps.get-version.outputs.version }}

          echo "OLD_VERSION=$OLD_VERSION"
          echo "NEW_VERSION=$NEW_VERSION"

          if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo "❌ You must bump version in VERSION file for this PR"
            exit 1
          fi

          echo "✅ Version bumped."
