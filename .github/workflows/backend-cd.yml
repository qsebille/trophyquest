name: Backend - CD
on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.build.outputs.version }}
      jar_path: ${{ steps.build.outputs.jar_path }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Spring Boot jar
        id: build
        working-directory: backend
        run: |
          set -e
          chmod +x gradlew
          ./gradlew clean bootJar

          APP_VERSION=$(grep '^version=' gradle.properties | cut -d'=' -f2)
          echo "version=$APP_VERSION" >> $GITHUB_OUTPUT

          JAR_FILE=$(ls build/libs/*.jar | head -n 1)
          echo "jar_path=backend/$JAR_FILE" >> $GITHUB_OUTPUT
          
          echo "Built backend/$JAR_FILE (version $APP_VERSION)"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload jar to S3 (artifact)
        run: |
          set -e
          APP_VERSION=${{ steps.build.outputs.version }}
          JAR_FILE=${{ steps.build.outputs.jar_path }}
          S3_KEY="backend/${APP_VERSION}-${GITHUB_SHA}/trophyquest-backend-${APP_VERSION}.jar"
          echo "S3_KEY=$S3_KEY" >> $GITHUB_ENV
          echo "Uploading to s3://${{ secrets.ARTIFACT_S3_BUCKET }}/${S3_KEY}"
          aws s3 cp "${JAR_FILE}" "s3://${{ secrets.ARTIFACT_S3_BUCKET }}/${S3_KEY}"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy on EC2 via SSM
        run: |
          set -e
          APP_VERSION=${{ needs.build.outputs.version }}
          S3_KEY="backend/${APP_VERSION}-${GITHUB_SHA}/trophyquest-backend-${APP_VERSION}.jar"
          echo "Using S3_KEY=$S3_KEY"
          
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceids,Values=${{ secrets.BACKEND_EC2_INSTANCE_ID }}" \
            --comment "Deploy TrophyQuest backend $APP_VERSION (${GITHUB_SHA})" \
            --parameters "commands=[
              \"set -e\",
              \"sudo mkdir -p /opt/trophyquest/logs\",
              \"sudo chown -R trophyquest:trophyquest /opt/trophyquest/logs\",
              \"aws s3api get-object --bucket '${{ secrets.ARTIFACT_S3_BUCKET }}' --key '$S3_KEY' /tmp/trophyquest-backend.jar\",
              \"sudo mv /tmp/trophyquest-backend.jar /opt/trophyquest/trophyquest-backend.jar\",
              \"sudo chown trophyquest:trophyquest /opt/trophyquest/trophyquest-backend.jar\",
              \"sudo systemctl restart trophyquest-backend\",
              \"sudo systemctl status trophyquest-backend --no-pager -l\",
              \"sudo ls -l /opt/trophyquest/logs || true\"
            ]" \
            --query "Command.CommandId" --output text)
          
          echo "SSM CommandId: $COMMAND_ID"
          
          set +e
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.BACKEND_EC2_INSTANCE_ID }}"
          WAIT_RC=$?
          set -e
          
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.BACKEND_EC2_INSTANCE_ID }}" \
            --query "{Status:Status,ResponseCode:ResponseCode,StdOut:StandardOutputContent,StdErr:StandardErrorContent}" \
            --output json
          
          exit $WAIT_RC
