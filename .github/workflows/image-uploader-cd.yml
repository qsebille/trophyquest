name: Image Uploader - CD
on:
  push:
    branches:
      - main
    paths:
      - "image_uploader/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      zip_path: ${{ steps.package.outputs.zip_path }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get version
        id: get-version
        uses: ./.github/actions/get-version
        with:
          service_name: image-uploader

      - name: Package Lambda
        id: package
        shell: bash
        run: |
          cd image_uploader
          rm -rf packaged-lambda lambda.zip
          mkdir -p packaged-lambda
          
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -t packaged-lambda/
          
          cp -r src/* packaged-lambda/
          
          cd packaged-lambda
          zip -r "../lambda.zip" .
          echo "zip_path=image_uploader/lambda.zip" >> $GITHUB_OUTPUT

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-uploader-lambda
          path: image_uploader/lambda.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Download zip artifact
        uses: actions/download-artifact@v4
        with:
          name: image-uploader-lambda

      - name: Deploy to AWS
        uses: ./.github/actions/deploy-lambda
        with:
          function_name: trophyquest-image-uploader
          semantic_version: ${{ needs.build.outputs.version }}
          zip_path: lambda.zip
          aws_region: ${{ secrets.AWS_REGION }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
