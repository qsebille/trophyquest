name: PSN Fetcher - Deploy Fetcher

on:
  push:
    branches:
      - main
    paths:
      - "psn_fetcher/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read


jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: psn_fetcher

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: psn_fetcher/package-lock.json

      - name: Get version
        id: get-version
        uses: ./.github/actions/get-version
        with:
          service_name: psn-fetcher

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prune dev deps
        run: npm prune --production

      - name: Package Lambda
        shell: bash
        run: |
          rm -rf packaged-lambda psn-fetcher.zip
          mkdir -p packaged-lambda
          
          cp psn_fetcher/package.json packaged-lambda/
          cp psn_fetcher/package-lock.json packaged-lambda/
          cp -r psn_fetcher/dist packaged-lambda/
          cp -r psn_fetcher/node_modules packaged-lambda/
          
          cd packaged-lambda
          zip -r "../psn-fetcher.zip" .

      - name: Deploy to AWS
        uses: ./.github/actions/deploy-lambda
        with:
          function_name: trophyquest-psn-fetcher
          semantic_version: ${{ steps.get-version.outputs.version }}
          alias_name: prod
          zip_path: psn-fetcher.zip
          aws_region: ${{ secrets.AWS_REGION }}
          aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}