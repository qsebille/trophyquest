name: Backend - CI
on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-*.yml"

jobs:
  check-version:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get-version
        uses: ./.github/actions/get-version
        with:
          service_name: backend

      - name: Compare versions
        run: |
          git fetch origin main
          OLD_VERSION=$(git show origin/main:backend/gradle.properties 2>/dev/null | grep '^version=' | cut -d'=' -f2 || echo "0.0.0")
          NEW_VERSION=${{ steps.get-version.outputs.version }}

          echo "OLD_VERSION=$OLD_VERSION"
          echo "NEW_VERSION=$NEW_VERSION"

          if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo "❌ You must bump version in gradle.properties file for this PR"
            exit 1
          fi

          echo "✅ Version bumped."

  test:
    runs-on: ubuntu-latest
    needs: check-version
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build and test
        run: |
          chmod +x gradlew
          ./gradlew clean test
