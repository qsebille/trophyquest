name: IGDB Enricher - CI
on:
  pull_request:
    branches:
      - main
    paths:
      - "igdb_enricher/**"
      - ".github/workflows/igdb-enricher-ci.yml"
      - ".github/actions/get-version/**"

jobs:
  check-version:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: igdb_enricher
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get-version
        uses: ./.github/actions/get-version
        with:
          service_name: igdb-enricher

      - name: Compare versions
        run: |
          git fetch origin main
          OLD_VERSION=$(git show origin/main:igdb_enricher/VERSION 2>/dev/null || echo "0.0.0")
          NEW_VERSION=${{ steps.get-version.outputs.version }}

          echo "OLD_VERSION=$OLD_VERSION"
          echo "NEW_VERSION=$NEW_VERSION"

          if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo "❌ You must bump version in VERSION file for this PR"
            exit 1
          fi

          echo "✅ Version bumped."

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: igdb_enricher
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock

      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:src
          pytest tests
