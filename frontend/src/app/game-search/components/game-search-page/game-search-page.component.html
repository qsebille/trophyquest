<div class="container pt-3 pb-5 d-flex flex-column align-items-center">
  <div class="card w-75">
    <div class="card-body">
      <tq-game-search-list [games]="games()"
                           [totalGames]="totalGames()"
                           (loadMore)="loadMore()"
                           (searchTermChanged)="onSearchTermChanges($event)"/>
      <tq-spinner-container [hidden]="!isLoading()"/>
    </div>
  </div>
</div>
