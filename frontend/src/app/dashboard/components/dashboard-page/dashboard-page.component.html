<div class="container p-2">
  @if (isLoading()) {
    <tq-spinner-container/>
  } @else {
    <div class="d-flex flex-column align-items-center gap-2">
      <tq-dashboard-igdb-mapping class="w-75" [stats]="igdbMappingStats()"/>
      <tq-dashboard-image-upload class="w-100"
                                 [gameImageUploads]="imageUploadStats().game()"
                                 [igdbImageUploads]="imageUploadStats().igdb()"
                                 [playerAvatarUploads]="imageUploadStats().player()"
                                 [trophyIconUploads]="imageUploadStats().trophy()"
                                 [trophySuiteImageUploads]="imageUploadStats().trophySuite()"/>
    </div>
  }
</div>
