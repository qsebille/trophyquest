@if (hasNoResults()) {
  <p class="text-muted">There is no game that need IGDB metadata validation</p>
} @else {
  <div class="d-flex flex-column gap-5">
    @for (mappingElement of mappingList(); track mappingElement.psnGameId) {
      <hr class="w-80" [hidden]="$index == 0"/>
      <tq-igdb-mapping-game-card class="w-100"
                                 [igdbMapping]="mappingElement"
                                 [isLoadingValidation]="isLoadingValidation()"
                                 (allRejected)="rejectAllCandidates(mappingElement.psnGameId)"
                                 (candidateAccepted)="acceptCandidate(mappingElement.psnGameId, $event)"/>
    }
    @if (isLoading()) {
      <tq-spinner-container/>
    }
  </div>
}
