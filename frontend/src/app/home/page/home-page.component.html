<div class="container mt-3">
  @if (isError()) {
    <div class="alert alert-danger">Error loading data</div>
  } @else if (isLoading()) {
    <tq-spinner-container/>
  } @else {
    <div class="d-flex gap-2">
      <tq-home-games class="w-60" [games]="games()" (clickOnGame)="navigateToGamePage($event)"/>
      <tq-home-player-list class="w-40"
                           [activePlayerTrophies]="activePlayerTrophies()"
                           (clickOnPlayer)="navigateToProfilePage($event)"
                           (clickOnGame)="navigateToTrophySuitePage($event)"/>
    </div>
  }
</div>
