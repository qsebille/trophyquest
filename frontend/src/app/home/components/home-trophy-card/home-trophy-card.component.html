<div class="d-flex justify-content-between align-items-center p-1 border-bottom">
  <div class="d-flex align-items-center gap-3">
    <img [height]="36" [width]="36" alt="Trophy" class="trophy-icon" [ngSrc]="trophy().icon"/>
    <div class="d-flex flex-column align-items-start">
      <div class="fw-bold">{{ trophy().title }}</div>
      <a class="tq-link" (click)="clickOnGameTitle.emit()">{{ trophy().trophySuiteTitle }}</a>
    </div>
  </div>
  <div class="d-flex flex-column align-items-center gap-1">
    <img [height]="24" [width]="24" alt="" ngSrc="assets/icons/trophy-{{trophy().trophyType}}.png"/>
    <div class="fs-8px text-muted">{{ trophy().earnedAt | date: 'dd/MM/yyyy HH:mm' }}</div>
  </div>
</div>
