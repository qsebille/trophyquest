<div class="card">
  <div class="card-header">
    <h5 class="card-title">Last played games</h5>
  </div>
  <div class="card-body">
    <div class="w-100 d-flex flex-column align-items-center gap-1">
      @if (isError()) {
        <div class="alert alert-danger w-90 text-center">
          An error occurred while loading trophies. Please try again later.
        </div>
      } @else {
        @for (trophySuite of trophySuites(); track trophySuite.id; let i = $index) {
          <hr class="tq-horiz-separator" [hidden]="i === 0"/>
          <tq-profile-trophy-suite-card class="w-100"
                                        (onClickOnGame)="onClickOnGame.emit({ gameId: trophySuite.gameId, trophySuiteId: trophySuite.id })"
                                        [trophySuite]="trophySuite"/>
        }
        @if (showLoadMoreButton()) {
          <div (click)="onLoadMoreGames.emit()" class="btn btn-primary mt-4">
            Load more games...
          </div>
        }
        @if (isLoading()) {
          <tq-spinner-container/>
        }
      }
    </div>
  </div>
</div>
